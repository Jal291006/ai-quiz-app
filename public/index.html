<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="questions.js"></script>
    <style>
        /* CSS Variables for a consistent color theme */
        :root {
            --primary: #4F46E5; /* Indigo blue */
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6; /* Soft light grey background */
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --correct: #10B981; /* Success green */
            --wrong: #EF4444; /* Error red */
        }

        /* Base Page Layout */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 700px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            line-height: 1.6;
        }

        h1 { 
            text-align: center; 
            color: var(--primary);
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        /* Top Control Bar (Dropdown and Button) */
        .controls-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            color: var(--text-muted);
        }

        select { 
            padding: 12px 15px; 
            font-size: 16px; 
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button { 
            padding: 12px 24px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        button:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-1px);
        }
        
        button:active {
            transform: scale(0.98);
        }

        /* Loading Animation */
        #loading { 
            display: none; 
            text-align: center;
            font-weight: 600; 
            color: var(--primary); 
            background: #EEF2FF;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* NEW: Beautiful Timer CSS */
        #timer-display {
            display: none;
            background-color: #FEE2E2;
            color: #DC2626;
            padding: 10px 25px;
            border-radius: 999px;
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            margin: 0 auto 20px auto;
            width: fit-content;
            border: 2px solid #F87171;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Question Cards */
        .question-card { 
            background-color: var(--card-bg);
            padding: 25px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-left: 6px solid transparent; /* Ready for green/red later */
            transition: all 0.3s ease; 
        }

        .question-card h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        /* Multiple Choice Options */
        .option { 
            display: flex; 
            align-items: center;
            margin: 10px 0; 
            padding: 12px 15px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            cursor: pointer; 
            transition: background-color 0.2s, border-color 0.2s;
        }

        .option:hover {
            background-color: #F9FAFB;
            border-color: #D1D5DB;
        }

        .option input {
            margin-right: 12px;
            transform: scale(1.2);
            cursor: pointer;
        }

        /* Submit Button */
        #submit-btn { 
            width: 100%; 
            background-color: #111827; /* Dark button so it stands out */
            margin-top: 10px; 
            font-size: 1.1rem;
            padding: 15px;
            display: none; 
        }

        #submit-btn:hover { 
            background-color: #374151; 
        }

        /* Final Score Display */
        #results { 
            margin-top: 30px; 
            font-size: 28px; 
            font-weight: 700; 
            text-align: center; 
            color: var(--text-main);
        }

        .correct-text { color: var(--correct); font-weight: 600; margin-top: 15px; }
        .wrong-text { color: var(--wrong); font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>AI Quiz Generator</h1>
    
    <div class="controls-container">
        <label for="category">Topic:</label>
        <select id="category">
            <option value="science">Science</option>
            <option value="history">History</option>
            <option value="geography">Geography</option>
            <option value="video games">Video Games</option>
            <option value="movies">Movies</option>
            <option value="a completely random educational topic">Surprise Me!</option>
        </select>

        <label for="amount">Questions:</label>
        <select id="amount">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
        </select>

        <label for="type">Type:</label>
        <select id="type">
            <option value="multiple-choice">Multiple Choice</option>
            <option value="true or false">True / False</option>
        </select>

        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium" selected>Medium</option>
            <option value="hard">Hard</option>
            <option value="expert">Expert (College Level)</option>
        </select>
        
        <button onclick="fetchQuiz()">Generate</button>
    </div>

    <p id="loading">Generating your questions please wait !</p>
    
    <div id="timer-display"> ⏱️ 00:00</div>
        <div id="progress-bar-container" style="display:none; background:#E5E7EB; border-radius:999px; height:10px; margin-bottom:20px;">
  <div id="progress-bar" style="height:10px; background:#4F46E5; border-radius:999px; width:0%; transition:width 0.4s ease;"></div>
</div>
<p id="progress-text" style="text-align:center; color:#6B7280; font-size:0.9rem; display:none;"></p>
        

    <div id="quiz-container"></div>
    
    <button id="submit-btn" onclick="calculateScore()">Submit Answers</button>
    <div id="results"></div>

    <script>
        let currentQuizData = [];
        // NEW: Global variables to track the clock
        let timerInterval;
        let timeRemaining = 0;

        // NEW: The function that runs the clock
        function startTimer(totalSeconds) {
            // Stop any old timers if the user hits "Generate" again quickly
            clearInterval(timerInterval);
            timeRemaining = totalSeconds;
            
            const timerDisplay = document.getElementById('timer-display');
            timerDisplay.style.display = 'block';
            timerDisplay.style.backgroundColor = '#FEE2E2'; // Reset color
            timerDisplay.style.color = '#DC2626';

            // This tiny function runs exactly once every second
            timerInterval = setInterval(() => {
                timeRemaining--;

                // Do the math to get Minutes:Seconds format
                const minutes = Math.floor(timeRemaining / 60);
                const seconds = timeRemaining % 60;
                
                // Add a zero to the front if it's less than 10 (e.g., 0:09 instead of 0:9)
                const formattedSeconds = seconds < 10 ? '0' + seconds : seconds;
                timerDisplay.innerHTML = `⏱️ Time Left: ${minutes}:${formattedSeconds}`;

                // Panic mode! Make it flash if under 10 seconds
                if (timeRemaining <= 10 && timeRemaining > 0) {
                    timerDisplay.style.backgroundColor = timeRemaining % 2 === 0 ? '#DC2626' : '#FEE2E2';
                    timerDisplay.style.color = timeRemaining % 2 === 0 ? '#FFFFFF' : '#DC2626';
                }

                // If time hits zero, auto-submit!
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.innerHTML = "⏱️ TIME'S UP!";
                    timerDisplay.style.backgroundColor = '#DC2626';
                    timerDisplay.style.color = '#FFFFFF';
                    calculateScore(); // Force the grading!
                }
            }, 1000);
        }
        async function fetchQuiz() {
    const category = document.getElementById('category').value;
    const amount = parseInt(document.getElementById('amount').value);
    const difficulty = document.getElementById('difficulty').value;
    
    const container = document.getElementById('quiz-container');
    const loading = document.getElementById('loading');
    const submitBtn = document.getElementById('submit-btn');
    const resultsDiv = document.getElementById('results');
    const timerDisplay = document.getElementById('timer-display');

    container.innerHTML = '';
    resultsDiv.innerHTML = '';
    submitBtn.style.display = 'none';

    timerDisplay.style.display = 'none'; 
    clearInterval(timerInterval); 
    loading.style.display = 'block';

    try {
        let allQuestions = [];

        // THE FIX: Handle the "Surprise Me" option
        if (category === "a completely random educational topic") {
            // Combine all arrays inside the questionBank into one giant array
            Object.values(questionBank).forEach(categoryArray => {
                allQuestions = allQuestions.concat(categoryArray);
            });
        } else {
            // Otherwise, just use the specific category they picked
            allQuestions = questionBank[category];
        }

        // Filter by difficulty
        const filteredQuestions = allQuestions.filter(q => q.difficulty === difficulty);
        
        // Shuffle and slice the exact amount needed
        const shuffled = filteredQuestions.sort(() => Math.random() - 0.5);
        const questions = shuffled.slice(0, amount);

        if (questions.length === 0) {
            loading.style.display = 'none';
            container.innerHTML = '<p style="color: var(--wrong); text-align: center;">No questions found for this difficulty!</p>';
            return;
        }

        currentQuizData = questions;
        loading.style.display = 'none';
        document.getElementById('progress-bar-container').style.display = 'block';
        document.getElementById('progress-text').style.display = 'block';
        updateProgressBar(0, questions.length);

        questions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `card-${index}`;
            let html = `<h3>${index + 1}. ${q.question}</h3>`;
            q.options.forEach(opt => {
                html += `<label class="option"><input type="radio" name="question${index}" value="${opt}"> ${opt}</label>`;
            });
            card.innerHTML = html;
            card.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', () => {
                    const answered = document.querySelectorAll('input[type="radio"]:checked').length;
                    updateProgressBar(answered, currentQuizData.length);
                });
            });
            container.appendChild(card);
        });

        submitBtn.style.display = 'block';
        startTimer(questions.length * 15);

    } catch (error) {
        loading.style.display = 'none';
        container.innerHTML = '<p style="color: var(--wrong); text-align: center; font-weight: bold;">Error loading quiz data.</p>';
        console.error(error);
    }
}
        

        function calculateScore() {
            // NEW: Stop the clock when they submit manually!
            clearInterval(timerInterval);

            let score = 0;
            const resultsDiv = document.getElementById('results');
            const submitBtn = document.getElementById('submit-btn');
            

            currentQuizData.forEach((q, index) => {
                const selectedOption = document.querySelector(`input[name="question${index}"]:checked`);
                const card = document.getElementById(`card-${index}`);

                // --- THIS IS THE UPDATED SECTION ---
                if (selectedOption) {
                    if (selectedOption.value === q.correctAnswer) {
                        score++;
                        updateProgressBar(index + 1, currentQuizData.length);
                        card.style.borderColor = 'var(--correct)'; 
                        card.style.backgroundColor = '#ECFDF5'; 
                        card.innerHTML += `<div class="correct-text">✓ Correct!</div>`;
                    } else {
                        card.style.borderColor = 'var(--wrong)'; 
                        card.style.backgroundColor = '#FEF2F2'; 
                        // NEW: Added the explanation here!
                        card.innerHTML += `
                            <div class="wrong-text">✗ Wrong! The correct answer was: <strong>${q.correctAnswer}</strong></div>
                            <div style="margin-top: 10px; font-size: 0.95rem; color: #4B5563;"><em><strong>Tutor:</strong> ${q.explanation}</em></div>
                        `;
                    }
                } else {
                    card.style.borderColor = '#F59E0B'; 
                    card.style.backgroundColor = '#FFFBEB'; 
                    // NEW: Added the explanation here too!
                    card.innerHTML += `
                        <div class="wrong-text" style="color: #D97706;">⚠ You skipped this one! The correct answer was: <strong>${q.correctAnswer}</strong></div>
                        <div style="margin-top: 10px; font-size: 0.95rem; color: #4B5563;"><em><strong>Tutor:</strong> ${q.explanation}</em></div>
                    `;
                }
                // -----------------------------------

                const allRadios = card.querySelectorAll('input[type="radio"]');
                allRadios.forEach(radio => radio.disabled = true);
            });

            resultsDiv.style.background = '#fff';
            resultsDiv.style.padding = '20px';
            resultsDiv.style.borderRadius = '12px';
            resultsDiv.style.boxShadow = '0 4px 6px rgba(0,0,0,0.05)';
            resultsDiv.innerHTML = `You scored ${score} out of ${currentQuizData.length}! 🎉`;
            
            submitBtn.style.display = 'none';
            
        }
        function updateProgressBar(answered, total) {
    const percent = (answered / total) * 100;
    document.getElementById('progress-bar').style.width = percent + '%';
    document.getElementById('progress-text').textContent = `Question ${answered} of ${total}`;
}
    </script>
</body>
</html>
